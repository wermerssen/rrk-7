<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1000" height="600"
     viewBox="0 0 1000 600">

    <!-- Marker definitions -->
    <defs>
        <marker id="arrow-blue"
                markerWidth="10" markerHeight="10"
                refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#0055CC"/>
        </marker>

        <marker id="arrow-green"
                markerWidth="10" markerHeight="10"
                refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#228833"/>
        </marker>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="1000" height="600" fill="white"/>

    <!-- Title -->
    <text x="500" y="50"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="22" fill="#000000">
        RRK‑7 — Ontology of Levels
    </text>

    <!-- Structural Level -->
    <rect x="150" y="150" width="250" height="80"
          fill="none" stroke="#000000" stroke-width="1.5"/>
    <text x="275" y="195"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18">
        Structural Level
    </text>

    <!-- Dynamic Level -->
    <rect x="150" y="300" width="250" height="80"
          fill="none" stroke="#000000" stroke-width="1.5"/>
    <text x="275" y="345"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18">
        Dynamic Level
    </text>

    <!-- Operator Level -->
    <rect x="150" y="450" width="250" height="80"
          fill="none" stroke="#000000" stroke-width="1.5"/>
    <text x="275" y="495"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18">
        Operator Level
    </text>

    <!-- Right-side concept boxes -->
    <!-- Structures -->
    <rect x="600" y="150" width="250" height="80"
          fill="none" stroke="#0055CC" stroke-width="1.5"/>
    <text x="725" y="195"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="16" fill="#0055CC">
        Structures (S₁…Sₙ)
    </text>

    <!-- Dynamics -->
    <rect x="600" y="300" width="250" height="80"
          fill="none" stroke="#0055CC" stroke-width="1.5"/>
    <text x="725" y="345"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="16" fill="#0055CC">
        Dynamics (τ, coupling)
    </text>

    <!-- Operators -->
    <rect x="600" y="450" width="250" height="80"
          fill="none" stroke="#0055CC" stroke-width="1.5"/>
    <text x="725" y="495"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="16" fill="#0055CC">
        Operators (β, transforms)
    </text>

    <!-- Arrows between levels -->
    <line x1="275" y1="230" x2="275" y2="300"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)" />
    <text x="300" y="265"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13" fill="#0055CC">
        induces
    </text>

    <line x1="275" y1="380" x2="275" y2="450"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)" />
    <text x="300" y="415"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13" fill="#0055CC">
        governed by
    </text>

    <!-- Arrows to right-side concepts -->
    <line x1="400" y1="190" x2="600" y2="190"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)" />
    <text x="500" y="175"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13" fill="#0055CC">
        defines
    </text>

    <line x1="400" y1="340" x2="600" y2="340"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)" />
    <text x="500" y="325"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13" fill="#0055CC">
        produces
    </text>

    <line x1="400" y1="490" x2="600" y2="490"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)" />
    <text x="500" y="475"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13" fill="#0055CC">
        transforms
    </text>

    <!-- Recursive relation -->
    <path d="M725 450
             C850 350, 850 250, 725 150"
          fill="none"
          stroke="#228833"
          stroke-width="1.5"
          marker-end="url(#arrow-green)" />
    <text x="850" y="300"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13" fill="#228833">
        recursive dependency
    </text>

    <!-- Subtitle -->
    <text x="500" y="580"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="14" fill="#333333">
        RRK‑7 ontology of levels: structures → dynamics → operators, with recursive dependencies.
    </text>

</svg>
