<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="900" height="450" viewBox="0 0 900 450">

    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10"
                refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#228833"/>
        </marker>
    </defs>

    <rect width="900" height="450" fill="white"/>

    <text x="450" y="40" text-anchor="middle"
          font-size="22" font-family="Arial">
        Component 4 — Recursive Feedback Loop
    </text>

    <!-- Nodes -->
    <circle cx="250" cy="250" r="40"
            fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="250" y="255" text-anchor="middle"
          font-size="18" font-family="Arial">S₁</text>

    <circle cx="450" cy="250" r="40"
            fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="450" y="255" text-anchor="middle"
          font-size="18" font-family="Arial">S₂</text>

    <circle cx="650" cy="250" r="40"
            fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="650" y="255" text-anchor="middle"
          font-size="18" font-family="Arial">S₃</text>

    <!-- Forward coupling -->
    <line x1="290" y1="250" x2="410" y2="250"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow)"/>

    <line x1="490" y1="250" x2="610" y2="250"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow)"/>

    <!-- Feedback -->
    <path d="M650 210 C650 120, 250 120, 250 210"
          fill="none" stroke="#228833" stroke-width="1.5"
          marker-end="url(#arrow)"/>

    <text x="450" y="110" text-anchor="middle"
          font-size="14" font-family="Arial" fill="#228833">
        recursive feedback
    </text>
</svg>
