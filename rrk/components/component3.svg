<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="900" height="450" viewBox="0 0 900 450">

    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10"
                refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#AA0000"/>
        </marker>
    </defs>

    <rect width="900" height="450" fill="white"/>

    <text x="450" y="40" text-anchor="middle"
          font-size="22" font-family="Arial">
        Component 3 — Dynamic Layer
    </text>

    <!-- Axes -->
    <line x1="120" y1="350" x2="780" y2="350"
          stroke="#000" stroke-width="1.5"/>
    <line x1="120" y1="350" x2="120" y2="100"
          stroke="#000" stroke-width="1.5"/>

    <text x="780" y="370" text-anchor="end"
          font-size="14" font-family="Arial">time t</text>
    <text x="100" y="100" text-anchor="start"
          font-size="14" font-family="Arial">coherence τ</text>

    <!-- τ curves -->
    <path d="M120 330 C300 250, 500 200, 780 180"
          fill="none" stroke="#0055CC" stroke-width="2"/>
    <text x="760" y="200" font-size="13"
          font-family="Arial" fill="#0055CC">
        β > 0.5
    </text>

    <path d="M120 330 C300 330, 500 330, 780 330"
          fill="none" stroke="#666" stroke-width="2"
          stroke-dasharray="6,4"/>
    <text x="760" y="320" font-size="13"
          font-family="Arial" fill="#666">
        β = 0.5
    </text>

    <path d="M120 330 C300 360, 500 380, 780 400"
          fill="none" stroke="#AA0000" stroke-width="2"/>
    <text x="760" y="390" font-size="13"
          font-family="Arial" fill="#AA0000">
        β < 0.5
    </text>

    <!-- β operator -->
    <rect x="400" y="80" width="100" height="50"
          fill="none" stroke="#AA0000" stroke-width="1.5"/>
    <text x="450" y="110" text-anchor="middle"
          font-size="18" font-family="Arial" fill="#AA0000">
        β
    </text>

    <line x1="450" y1="130" x2="450" y2="180"
          stroke="#AA0000" stroke-width="1.5"
          marker-end="url(#arrow)"/>
</svg>
