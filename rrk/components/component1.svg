<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="800" height="400" viewBox="0 0 800 400">

    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10"
                refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#0055CC"/>
        </marker>
    </defs>

    <rect width="800" height="400" fill="white"/>

    <text x="400" y="40" text-anchor="middle"
          font-size="22" font-family="Arial">
        Component 1 — Recursive Unit
    </text>

    <circle cx="400" cy="200" r="50"
            fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="400" y="205" text-anchor="middle"
          font-size="20" font-family="Arial">S₁</text>

    <path d="M450 200 C500 150, 300 150, 350 200"
          fill="none" stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow)"/>

    <text x="400" y="130" text-anchor="middle"
          font-size="14" font-family="Arial" fill="#0055CC">
        recursive self‑mapping
    </text>
