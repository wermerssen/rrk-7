<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="800" height="500"
     viewBox="0 0 800 500">

    <!-- Marker definitions -->
    <defs>
        <marker id="arrow-axis"
                markerWidth="10" markerHeight="10"
                refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
        </marker>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="800" height="500" fill="white"/>

    <!-- Title -->
    <text x="400" y="42"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="22" fill="#000000">
        RRK‑7 — Influence of β on Coherence τ(t)
    </text>

    <!-- Axes -->
    <line x1="100" y1="400" x2="700" y2="400"
          stroke="#000000" stroke-width="1.5"
          marker-end="url(#arrow-axis)" />

    <line x1="100" y1="400" x2="100" y2="80"
          stroke="#000000" stroke-width="1.5"
          marker-end="url(#arrow-axis)" />

    <!-- Axis labels -->
    <text x="700" y="420"
          font-family="Arial, Helvetica, sans-serif"
          font-size="14" text-anchor="end">
        time t
    </text>

    <text x="80" y="90"
          font-family="Arial, Helvetica, sans-serif"
          font-size="14" text-anchor="start">
        coherence τ
    </text>

    <!-- β < 0.5 (divergent) -->
    <path d="M100 380
             C220 360, 340 350, 460 360
             C580 370, 660 385, 700 395"
          fill="none" stroke="#AA0000" stroke-width="2"/>
    <text x="680" y="365"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13" fill="#AA0000">
        β < 0.5 (divergent)
    </text>

    <!-- β = 0.5 (neutral) -->
    <path d="M100 300
             C300 300, 500 300, 700 300"
          fill="none" stroke="#666666" stroke-width="2"
          stroke-dasharray="6,4"/>
    <text x="680" y="290"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13" fill="#666666">
        β = 0.5 (neutral)
    </text>

    <!-- β > 0.5 (convergent) -->
    <path d="M100 380
             C220 300, 340 240, 460 200
             C580 180, 660 170, 700 165"
          fill="none" stroke="#0055CC" stroke-width="2"/>
    <text x="680" y="185"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13" fill="#0055CC">
        β > 0.5 (convergent)
    </text>

    <!-- Subtitle -->
    <text x="400" y="440"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="14" fill="#333333">
        Coherence trajectories τ(t) under different β‑regimes in RRK‑7 recursive coupling.
    </text>

</svg>
