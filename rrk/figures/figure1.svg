<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="800"
    height="500"
    viewBox="0 0 800 500">

    <!-- Marker definitions -->
    <defs>
        <!-- Standard coupling arrow (blue) -->
        <marker id="arrow-blue"
                markerWidth="10"
                markerHeight="10"
                refX="8"
                refY="3"
                orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#0055CC"/>
        </marker>

        <!-- Feedback arrow (green) -->
        <marker id="arrow-green"
                markerWidth="10"
                markerHeight="10"
                refX="8"
                refY="3"
                orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#228833"/>
        </marker>
    </defs>

    <!-- Hintergrund -->
    <rect x="0" y="0" width="800" height="500" fill="white" />

    <!-- Titel -->
    <text
        x="400"
        y="42"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="22"
        fill="#000000">
        RRK‑7 Minimal Model — Recursive Coupling
    </text>

    <!-- Systemgrenze -->
    <rect
        x="100"
        y="80"
        width="600"
        height="360"
        fill="none"
        stroke="#333333"
        stroke-width="1.5" />

    <!-- Knoten: S₁ -->
    <circle cx="220" cy="220" r="35"
            fill="none" stroke="#000000" stroke-width="1.5"/>
    <text x="220" y="225"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="16"
          fill="#000000">S₁</text>

    <!-- Knoten: S₂ -->
    <circle cx="400" cy="220" r="35"
            fill="none" stroke="#000000" stroke-width="1.5"/>
    <text x="400" y="225"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="16"
          fill="#000000">S₂</text>

    <!-- Knoten: S₃ -->
    <circle cx="580" cy="220" r="35"
            fill="none" stroke="#000000" stroke-width="1.5"/>
    <text x="580" y="225"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="16"
          fill="#000000">S₃</text>

    <!-- Kopplung S₁ → S₂ -->
    <line x1="255" y1="220" x2="365" y2="220"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)" />
    <text x="310" y="205"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13"
          fill="#0055CC">coupling</text>

    <!-- Kopplung S₂ → S₃ -->
    <line x1="435" y1="220" x2="545" y2="220"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)" />
    <text x="490" y="205"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13"
          fill="#0055CC">coupling</text>

    <!-- Rekursives Feedback S₃ → S₁ -->
    <path d="M580 185
             C580 110, 220 110, 220 175"
          fill="none"
          stroke="#228833"
          stroke-width="1.5"
          marker-end="url(#arrow-green)" />
    <text x="400" y="115"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13"
          fill="#228833">recursive feedback</text>

    <!-- Untertitel -->
    <text
        x="400"
        y="430"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14"
        fill="#333333">
        Three coupled states with a recursive feedback loop — minimal RRK‑7 configuration.
    </text>

</svg>
