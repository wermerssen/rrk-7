<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="900" height="500"
     viewBox="0 0 900 500">

    <!-- Marker definitions -->
    <defs>
        <marker id="arrow-blue"
                markerWidth="10" markerHeight="10"
                refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#0055CC"/>
        </marker>

        <marker id="arrow-red"
                markerWidth="10" markerHeight="10"
                refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#AA0000"/>
        </marker>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="900" height="500" fill="white"/>

    <!-- Title -->
    <text x="450" y="42"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="22" fill="#000000">
        RRK‑7 — Convergence vs Divergence
    </text>

    <!-- Left panel border -->
    <rect x="60" y="80" width="360" height="360"
          fill="none" stroke="#333333" stroke-width="1.5"/>

    <!-- Right panel border -->
    <rect x="480" y="80" width="360" height="360"
          fill="none" stroke="#333333" stroke-width="1.5"/>

    <!-- Panel titles -->
    <text x="240" y="110"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18" fill="#000000">
        Convergent Dynamics
    </text>

    <text x="660" y="110"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18" fill="#000000">
        Divergent Dynamics
    </text>

    <!-- Convergent: nodes moving inward -->
    <circle cx="150" cy="260" r="30"
            fill="none" stroke="#000000" stroke-width="1.5"/>
    <circle cx="330" cy="260" r="30"
            fill="none" stroke="#000000" stroke-width="1.5"/>

    <!-- Convergent arrows -->
    <line x1="180" y1="260" x2="210" y2="260"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)" />

    <line x1="300" y1="260" x2="270" y2="260"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)" />

    <!-- Convergent center -->
    <circle cx="240" cy="260" r="20"
            fill="none" stroke="#0055CC" stroke-width="1.5"/>
    <text x="240" y="265"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="14" fill="#0055CC">
        S*
    </text>

    <!-- Divergent: nodes moving outward -->
    <circle cx="570" cy="260" r="30"
            fill="none" stroke="#000000" stroke-width="1.5"/>
    <circle cx="750" cy="260" r="30"
            fill="none" stroke="#000000" stroke-width="1.5"/>

    <!-- Divergent arrows -->
    <line x1="600" y1="260" x2="630" y2="260"
          stroke="#AA0000" stroke-width="1.5"
          marker-end="url(#arrow-red)" />

    <line x1="720" y1="260" x2="690" y2="260"
          stroke="#AA0000" stroke-width="1.5"
          marker-end="url(#arrow-red)" />

    <!-- Divergent center (unstable) -->
    <circle cx="660" cy="260" r="20"
            fill="none" stroke="#AA0000" stroke-width="1.5"/>
    <text x="660" y="265"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="14" fill="#AA0000">
        unstable
    </text>

    <!-- Subtitle -->
    <text x="450" y="460"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="14" fill="#333333">
        Convergent RRK‑7 dynamics collapse toward a stable attractor S*, while divergent dynamics move away from it.
    </text>

</svg>
