<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1000" height="600"
     viewBox="0 0 1000 600">

    <!-- Marker definitions -->
    <defs>
        <marker id="arrow-blue"
                markerWidth="10" markerHeight="10"
                refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#0055CC"/>
        </marker>

        <marker id="arrow-green"
                markerWidth="10" markerHeight="10"
                refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#228833"/>
        </marker>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="1000" height="600" fill="white"/>

    <!-- Title -->
    <text x="500" y="50"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="22" fill="#000000">
        RRK‑7 — Multi‑Layer Coupling Structure
    </text>

    <!-- Layer labels -->
    <text x="150" y="130"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18" fill="#000000">
        Layer 1
    </text>

    <text x="150" y="280"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18" fill="#000000">
        Layer 2
    </text>

    <text x="150" y="430"
          font-family="Arial, Helvetica, sans-serif"
          font-size="18" fill="#000000">
        Layer 3
    </text>

    <!-- Layer 1 nodes -->
    <circle cx="350" cy="150" r="30"
            fill="none" stroke="#000000" stroke-width="1.5"/>
    <text x="350" y="155"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="16">S₁</text>

    <circle cx="550" cy="150" r="30"
            fill="none" stroke="#000000" stroke-width="1.5"/>
    <text x="550" y="155"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="16">S₂</text>

    <!-- Layer 2 nodes -->
    <circle cx="350" cy="300" r="30"
            fill="none" stroke="#000000" stroke-width="1.5"/>
    <text x="350" y="305"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="16">S₃</text>

    <circle cx="550" cy="300" r="30"
            fill="none" stroke="#000000" stroke-width="1.5"/>
    <text x="550" y="305"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="16">S₄</text>

    <!-- Layer 3 nodes -->
    <circle cx="350" cy="450" r="30"
            fill="none" stroke="#000000" stroke-width="1.5"/>
    <text x="350" y="455"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="16">S₅</text>

    <circle cx="550" cy="450" r="30"
            fill="none" stroke="#000000" stroke-width="1.5"/>
    <text x="550" y="455"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="16">S₆</text>

    <!-- Horizontal couplings -->
    <line x1="380" y1="150" x2="520" y2="150"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)" />

    <line x1="380" y1="300" x2="520" y2="300"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)" />

    <line x1="380" y1="450" x2="520" y2="450"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)" />

    <!-- Vertical couplings -->
    <line x1="350" y1="180" x2="350" y2="270"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)" />

    <line x1="550" y1="180" x2="550" y2="270"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)" />

    <line x1="350" y1="330" x2="350" y2="420"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)" />

    <line x1="550" y1="330" x2="550" y2="420"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)" />

    <!-- Recursive feedback loop -->
    <path d="M550 450
             C700 350, 700 150, 550 150"
          fill="none"
          stroke="#228833"
          stroke-width="1.5"
          marker-end="url(#arrow-green)" />

    <text x="700" y="300"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13" fill="#228833">
        recursive feedback
    </text>

    <!-- Subtitle -->
    <text x="500" y="560"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="14" fill="#333333">
        Three-layer RRK‑7 structure with horizontal and vertical coupling and a global feedback loop.
    </text>

</svg>
