<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="800"
    height="500"
    viewBox="0 0 800 500">

    <!-- Marker definitions -->
    <defs>
        <marker id="arrow-axis"
                markerWidth="10"
                markerHeight="10"
                refX="8"
                refY="3"
                orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
        </marker>
    </defs>

    <!-- Hintergrund -->
    <rect x="0" y="0" width="800" height="500" fill="white" />

    <!-- Titel -->
    <text
        x="400"
        y="42"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="22"
        fill="#000000">
        RRK‑7 Recursive Coupling Dynamics — τ(t)
    </text>

    <!-- Achsen -->
    <line x1="100" y1="400" x2="700" y2="400"
          stroke="#000000" stroke-width="1.5"
          marker-end="url(#arrow-axis)" />

    <line x1="100" y1="400" x2="100" y2="80"
          stroke="#000000" stroke-width="1.5"
          marker-end="url(#arrow-axis)" />

    <!-- Achsenbeschriftung -->
    <text x="700" y="420"
          font-family="Arial, Helvetica, sans-serif"
          font-size="14"
          text-anchor="end"
          fill="#000000">time t</text>

    <text x="80" y="90"
          font-family="Arial, Helvetica, sans-serif"
          font-size="14"
          text-anchor="start"
          fill="#000000">coherence τ</text>

    <!-- Kurve: β < 0.5 (divergent) -->
    <path d="M100 380
             C200 360, 300 340, 400 330
             S600 350, 700 380"
          fill="none"
          stroke="#AA0000"
          stroke-width="2" />
    <text x="680" y="365"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13"
          fill="#AA0000">β < 0.5</text>

    <!-- Kurve: β = 0.5 (neutral) -->
    <path d="M100 300
             C250 300, 450 300, 700 300"
          fill="none"
          stroke="#666666"
          stroke-width="2"
          stroke-dasharray="6,4" />
    <text x="680" y="290"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13"
          fill="#666666">β = 0.5</text>

    <!-- Kurve: β > 0.5 (convergent) -->
    <path d="M100 380
             C200 300, 300 240, 400 200
             S600 180, 700 170"
          fill="none"
          stroke="#0055CC"
          stroke-width="2" />
    <text x="680" y="185"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13"
          fill="#0055CC">β > 0.5</text>

    <!-- Untertitel -->
    <text
