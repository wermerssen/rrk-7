<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="900" height="400" viewBox="0 0 900 400">

    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10"
                refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#0055CC"/>
        </marker>
    </defs>

    <rect width="900" height="400" fill="white"/>

    <text x="450" y="40" text-anchor="middle"
          font-size="22" font-family="Arial">
        Component 2 — Coupling Structure
    </text>

    <circle cx="200" cy="200" r="40"
            fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="200" y="205" text-anchor="middle"
          font-size="18" font-family="Arial">S₁</text>

    <circle cx="450" cy="200" r="40"
            fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="450" y="205" text-anchor="middle"
          font-size="18" font-family="Arial">S₂</text>

    <circle cx="700" cy="200" r="40"
            fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="700" y="205" text-anchor="middle"
          font-size="18" font-family="Arial">S₃</text>

    <line x1="240" y1="200" x2="410" y2="200"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow)"/>

    <line x1="490" y1="200" x2="660" y2="200"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow)"/>

    <text x="450" y="150" text-anchor="middle"
          font-size="14" font-family="Arial" fill="#0055CC">
        directed coupling chain
    </text>
</svg>
