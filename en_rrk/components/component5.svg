<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="900" height="500" viewBox="0 0 900 500">

    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10"
                refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#0055CC"/>
        </marker>
    </defs>

    <rect width="900" height="500" fill="white"/>

    <text x="450" y="40" text-anchor="middle"
          font-size="22" font-family="Arial">
        Component 5 — System Integration (M₇)
    </text>

    <!-- Modules -->
    <rect x="150" y="150" width="120" height="60"
          fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="210" y="185" text-anchor="middle"
          font-size="16" font-family="Arial">M₁</text>

    <rect x="300" y="150" width="120" height="60"
          fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="360" y="185" text-anchor="middle"
          font-size="16" font-family="Arial">M₂</text>

    <rect x="450" y="150" width="120" height="60"
          fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="510" y="185" text-anchor="middle"
          font-size="16" font-family="Arial">M₃</text>

    <rect x="600" y="150" width="120" height="60"
          fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="660" y="185" text-anchor="middle"
          font-size="16" font-family="Arial">M₄</text>

    <!-- Integration target -->
    <rect x="350" y="300" width="200" height="70"
          fill="none" stroke="#0055CC" stroke-width="1.5"/>
    <text x="450" y="340" text-anchor="middle"
          font-size="20" font-family="Arial" fill="#0055CC">
        M₇ Integrator
    </text>

    <!-- Arrows -->
    <line x1="210" y1="210" x2="450" y2="300"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow)"/>

    <line x1="360" y1="210" x2="450" y2="300"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow)"/>

    <line x1="510" y1="210" x2="450" y2="300"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow)"/>

    <line x1="660" y1="210" x2="450" y2="300"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow)"/>

    <text x="450" y="390" text-anchor="middle"
          font-size="14" font-family="Arial" fill="#0055CC">
        system-level integration
    </text>
</svg>
