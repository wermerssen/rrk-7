<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="750" viewBox="0 0 1200 750">

    <defs>
        <marker id="arrow-blue" markerWidth="10" markerHeight="10"
                refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#0055CC"/>
        </marker>

        <marker id="arrow-green" markerWidth="10" markerHeight="10"
                refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#228833"/>
        </marker>

        <marker id="arrow-red" markerWidth="10" markerHeight="10"
                refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#AA0000"/>
        </marker>
    </defs>

    <rect width="1200" height="750" fill="white"/>

    <!-- Title -->
    <text x="600" y="60" text-anchor="middle"
          font-size="28" font-family="Arial">
        RRK‑7 — Ontology Overview
    </text>

    <!-- Central RRK Ontology -->
    <rect x="500" y="120" width="200" height="80"
          fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="600" y="165" text-anchor="middle"
          font-size="22" font-family="Arial">
        RRK‑Ontology
    </text>

    <!-- Four ontology domains -->
    <!-- Structures -->
    <rect x="150" y="300" width="250" height="80"
          fill="none" stroke="#0055CC" stroke-width="1.5"/>
    <text x="275" y="345" text-anchor="middle"
          font-size="20" font-family="Arial" fill="#0055CC">
        Structures
    </text>

    <!-- Dynamics -->
    <rect x="450" y="300" width="250" height="80"
          fill="none" stroke="#0055CC" stroke-width="1.5"/>
    <text x="575" y="345" text-anchor="middle"
          font-size="20" font-family="Arial" fill="#0055CC">
        Dynamics
    </text>

    <!-- Operators -->
    <rect x="750" y="300" width="250" height="80"
          fill="none" stroke="#0055CC" stroke-width="1.5"/>
    <text x="875" y="345" text-anchor="middle"
          font-size="20" font-family="Arial" fill="#0055CC">
        Operators
    </text>

    <!-- Levels -->
    <rect x="450" y="480" width="250" height="80"
          fill="none" stroke="#0055CC" stroke-width="1.5"/>
    <text x="575" y="525" text-anchor="middle"
          font-size="20" font-family="Arial" fill="#0055CC">
        Levels
    </text>

    <!-- Arrows from central ontology -->
    <line x1="600" y1="200" x2="275" y2="300"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)"/>
    <line x1="600" y1="200" x2="575" y2="300"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)"/>
    <line x1="600" y1="200" x2="875" y2="300"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)"/>

    <line x1="600" y1="200" x2="575" y2="480"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)"/>

    <!-- Inter-domain relations -->
    <line x1="275" y1="380" x2="575" y2="380"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)"/>
    <text x="425" y="365" text-anchor="middle"
          font-size="14" font-family="Arial" fill="#0055CC">
        structures induce dynamics
    </text>

    <line x1="575" y1="380" x2="875" y2="380"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)"/>
    <text x="725" y="365" text-anchor="middle"
          font-size="14" font-family="Arial" fill="#0055CC">
        dynamics governed by operators
    </text>

    <line x1="575" y1="480" x2="575" y2="380"
          stroke="#0055CC" stroke-width="1.5"
          marker-end="url(#arrow-blue)"/>
    <text x="600" y="430" text-anchor="middle"
          font-size="14" font-family="Arial" fill="#0055CC">
        levels organize domains
    </text>

    <!-- Recursive feedback -->
    <path d="M875 300
             C1050 200, 1050 120, 600 120"
          fill="none" stroke="#228833" stroke-width="1.5"
          marker-end="url(#arrow-green)"/>
    <text x="1050" y="180" text-anchor="middle"
          font-size="14" font-family="Arial" fill="#228833">
        recursive ontology relation
    </text>

    <!-- β operator -->
    <rect x="900" y="480" width="120" height="60"
          fill="none" stroke="#AA0000" stroke-width="1.5"/>
    <text x="960" y="515" text-anchor="middle"
          font-size="22" font-family="Arial" fill="#AA0000">
        β
    </text>

    <line x1="960" y1="480" x2="875" y2="380"
          stroke="#AA0000" stroke-width="1.5"
          marker-end="url(#arrow-red)"/>
    <text x="930" y="430" text-anchor="middle"
          font-size="14" font-family="Arial" fill="#AA0000">
        modulates operators
    </text>

</svg>
